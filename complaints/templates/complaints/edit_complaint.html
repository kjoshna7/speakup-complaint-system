{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Edit Complaint</title>

<link rel="stylesheet" href="{% static 'complaints/style.css' %}">

<style>

body{
background:linear-gradient(135deg,#6a11cb,#2575fc);
font-family:"Segoe UI";
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:60px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2575fc;
}

label{
font-weight:600;
display:block;
margin-top:15px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
height:100px;
}

.buttons{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:25px;
gap:10px;
flex-wrap:wrap;
}

.btn-save{
background:#28a745;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

.btn-back{
background:#6c757d;
color:white;
padding:10px 20px;
border-radius:20px;
text-decoration:none;
}

.btn-delete{
background:#dc3545;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>

</head>

<body>

{% include 'complaints/navbar.html' %}

<div class="container">

<h2>Edit Complaint</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<label>Category</label>
<input type="text" name="category" value="{{ complaint.category }}">

<label>Description</label>
<textarea name="description">{{ complaint.description }}</textarea>

<label>Address</label>
<textarea name="address">{{ complaint.address }}</textarea>

<label>City</label>
<input type="text" name="city" value="{{ complaint.city }}">

<label>State</label>
<input type="text" name="state" value="{{ complaint.state }}">

<label>Zipcode</label>
<input type="text" name="zipcode" value="{{ complaint.zipcode }}">

<label>Priority</label>
<select name="priority">

<option value="Low" {% if complaint.priority == "Low" %}selected{% endif %}>Low</option>
<option value="Medium" {% if complaint.priority == "Medium" %}selected{% endif %}>Medium</option>
<option value="High" {% if complaint.priority == "High" %}selected{% endif %}>High</option>

</select>

<div class="buttons">

<button type="submit" class="btn-save">
Save Changes
</button>

<a href="{% url 'complaint_detail' complaint.id %}" class="btn-back">
Cancel
</a>

</form>

<!-- DELETE FORM -->
<form method="POST" action="{% url 'delete_complaint' complaint.id %}">
{% csrf_token %}

<button type="submit"
class="btn-delete"
onclick="return confirm('Are you sure you want to delete this complaint?');">

Delete Complaint

</button>

</form>

</div>

</div>

</body>
</html>
