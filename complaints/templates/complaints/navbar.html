<style>

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:65px;
    background:linear-gradient(135deg,#1e3a8a,#ec4899);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    z-index:1000;
    font-family:"Segoe UI",sans-serif;
}

/* LEFT SIDE */

.nav-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.home-icon{
    font-size:24px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.home-icon:hover{
    transform:scale(1.2);
}

/* BACK BUTTON */

.back-btn{
    text-decoration:none;
    color:white;
    font-size:14px;
    font-weight:600;
    padding:6px 14px;
    border-radius:20px;
    background:rgba(255,255,255,0.2);
    transition:0.3s;
}

.back-btn:hover{
    background:rgba(255,255,255,0.35);
    transform:translateY(-2px);
}

/* RIGHT SIDE */

.nav-right{
    display:flex;
    align-items:center;
    gap:18px;
}

.nav-right a{
    text-decoration:none;
    color:white;
    font-size:14px;
    font-weight:600;
    padding:8px 16px;
    border-radius:25px;
    transition:all 0.3s ease;
}

.nav-right a:hover{
    background:rgba(255,255,255,0.25);
    transform:translateY(-2px);
}

/* USER ICON */

.user-icon{
    font-size:20px;
}

/* BODY SPACING */

body{
    padding-top:75px;
}

</style>


<nav class="navbar">

<div class="nav-left">

<a href="{% url 'home' %}" class="home-icon">
🏠
</a>

<a href="javascript:history.back()" class="back-btn">
⬅ Back
</a>

</div>


<div class="nav-right">

<a href="{% url 'dashboard' %}">
📊 Dashboard
</a>

<a href="{% url 'public_eye' %}">
👁 Public Eye
</a>
<li class="nav-item">
    <a class="nav-link" href="{% url 'notifications' %}">
        🔔 Notifications
        {% if notification_count > 0 %}
        <span class="badge">{{ notification_count }}</span>
        {% endif %}
    </a>
</li>
<a href="{% url 'profile' %}">
👤 Profile
</a>

</div>

</nav>
