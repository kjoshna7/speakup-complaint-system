<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpeakUp Reset Password</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2d33,#1e4a53);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* Card */

.container{
width:420px;
background:#5f747a;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Logo */

.logo{
background:#ff7a1a;
width:80px;
height:80px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:35px;
}

/* Title */

h1{
color:white;
margin-top:15px;
}

.subtitle{
color:#e6e6e6;
margin-bottom:25px;
}

/* Form */

label{
display:block;
text-align:left;
color:white;
margin-top:10px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#e0e0e0;
font-size:14px;
}

/* Password info */

.password-info{
font-size:12px;
color:#f0f0f0;
text-align:left;
margin-top:6px;
margin-bottom:10px;
opacity:0.8;
}

/* Button */

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:25px;
background:#ff7a1a;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff6a00;
}

/* Footer */

.footer{
margin-top:15px;
color:white;
}

.footer a{
color:white;
font-weight:bold;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">🔑</div>

<h1>Reset Password</h1>
<p class="subtitle">Enter a new password for your account</p>

<form method="POST">
{% csrf_token %}

<label>Username</label>
<input type="text" name="username" required>

<label>New Password</label>
<input type="password" name="password" minlength="8" required>

<div class="password-info">
Password must be at least 8 characters
</div>

<button type="submit">Reset Password</button>

</form>

<div class="footer">
Remember your password? 
<a href="{% url 'login' %}">Login</a>
</div>

</div>

</body>
</html>
